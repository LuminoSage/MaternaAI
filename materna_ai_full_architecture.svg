<svg width="100%" viewBox="0 0 680 720">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Title -->
<text class="th" x="340" y="28" text-anchor="middle" font-size="15">MaternaAI — full system architecture</text>

<!-- LAYER 1: Data -->
<text class="ts" x="40" y="60" font-size="11" opacity="0.6">PHASE 1 — DATA</text>
<g class="node c-teal" onclick="sendPrompt('Tell me about the ASEAN dataset we built')">
  <rect x="40" y="70" width="160" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="120" y="91" text-anchor="middle" dominant-baseline="central">ASEAN dataset</text>
  <text class="ts" x="120" y="109" text-anchor="middle" dominant-baseline="central">16,900 patients, 10 countries</text>
</g>
<g class="node c-teal" onclick="sendPrompt('What is the WHO GHO API data we use?')">
  <rect x="220" y="70" width="160" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="300" y="91" text-anchor="middle" dominant-baseline="central">WHO GHO API</text>
  <text class="ts" x="300" y="109" text-anchor="middle" dominant-baseline="central">Live ASEAN health stats</text>
</g>
<g class="node c-teal" onclick="sendPrompt('What DHS survey data are we using?')">
  <rect x="400" y="70" width="160" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="480" y="91" text-anchor="middle" dominant-baseline="central">DHS survey data</text>
  <text class="ts" x="480" y="109" text-anchor="middle" dominant-baseline="central">Indonesia, Vietnam, Cambodia</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="124" x2="340" y2="154" class="arr" marker-end="url(#arrow)"/>

<!-- LAYER 2: Model -->
<text class="ts" x="40" y="168" font-size="11" opacity="0.6">PHASE 2 — AI MODEL (what we build next)</text>
<g class="node c-purple" onclick="sendPrompt('Explain the XGBoost model training')">
  <rect x="40" y="178" width="150" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="199" text-anchor="middle" dominant-baseline="central">XGBoost model</text>
  <text class="ts" x="115" y="217" text-anchor="middle" dominant-baseline="central">Risk classification</text>
  <text class="ts" x="115" y="232" text-anchor="middle" dominant-baseline="central">31 features</text>
</g>
<g class="node c-purple" onclick="sendPrompt('Explain leave-one-country-out validation')">
  <rect x="210" y="178" width="150" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="285" y="199" text-anchor="middle" dominant-baseline="central">Leave-one-out</text>
  <text class="ts" x="285" y="217" text-anchor="middle" dominant-baseline="central">External validation</text>
  <text class="ts" x="285" y="232" text-anchor="middle" dominant-baseline="central">Vietnam holdout</text>
</g>
<g class="node c-purple" onclick="sendPrompt('Explain SHAP interpretability for our model')">
  <rect x="380" y="178" width="150" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="455" y="199" text-anchor="middle" dominant-baseline="central">SHAP analysis</text>
  <text class="ts" x="455" y="217" text-anchor="middle" dominant-baseline="central">Explainability</text>
  <text class="ts" x="455" y="232" text-anchor="middle" dominant-baseline="central">3 case writeups</text>
</g>
<g class="node c-purple" onclick="sendPrompt('What fairness metrics do we measure?')">
  <rect x="550" y="178" width="120" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="610" y="199" text-anchor="middle" dominant-baseline="central">Fairness</text>
  <text class="ts" x="610" y="217" text-anchor="middle" dominant-baseline="central">By country</text>
  <text class="ts" x="610" y="232" text-anchor="middle" dominant-baseline="central">Rural vs urban</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="244" x2="340" y2="274" class="arr" marker-end="url(#arrow)"/>

<!-- LAYER 3: Metrics -->
<text class="ts" x="40" y="288" font-size="11" opacity="0.6">PHASE 3 — EVALUATION</text>
<g class="node c-amber" onclick="sendPrompt('What health metrics do we report?')">
  <rect x="40" y="298" width="140" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="319" text-anchor="middle" dominant-baseline="central">ROC-AUC</text>
  <text class="ts" x="110" y="337" text-anchor="middle" dominant-baseline="central">+ AUPRC + F1</text>
  <text class="ts" x="110" y="352" text-anchor="middle" dominant-baseline="central">Bootstrapped 95% CI</text>
</g>
<g class="node c-amber" onclick="sendPrompt('What is a calibration plot and Brier score?')">
  <rect x="200" y="298" width="140" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="270" y="319" text-anchor="middle" dominant-baseline="central">Calibration plot</text>
  <text class="ts" x="270" y="337" text-anchor="middle" dominant-baseline="central">Brier score</text>
  <text class="ts" x="270" y="352" text-anchor="middle" dominant-baseline="central">Probability reliability</text>
</g>
<g class="node c-amber" onclick="sendPrompt('What is sensitivity at 80% specificity?')">
  <rect x="360" y="298" width="140" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="430" y="319" text-anchor="middle" dominant-baseline="central">Sensitivity</text>
  <text class="ts" x="430" y="337" text-anchor="middle" dominant-baseline="central">At 80% specificity</text>
  <text class="ts" x="430" y="352" text-anchor="middle" dominant-baseline="central">Clinical threshold</text>
</g>
<g class="node c-amber" onclick="sendPrompt('Explain group fairness analysis per country')">
  <rect x="520" y="298" width="140" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="590" y="319" text-anchor="middle" dominant-baseline="central">Group metrics</text>
  <text class="ts" x="590" y="337" text-anchor="middle" dominant-baseline="central">Per country AUC</text>
  <text class="ts" x="590" y="352" text-anchor="middle" dominant-baseline="central">Rural vs urban</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="364" x2="340" y2="394" class="arr" marker-end="url(#arrow)"/>

<!-- LAYER 4: Demo -->
<text class="ts" x="40" y="408" font-size="11" opacity="0.6">PHASE 4 — DEMO (what judges see)</text>
<g class="node c-coral" onclick="sendPrompt('What does the Streamlit demo look like?')">
  <rect x="40" y="418" width="180" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="130" y="439" text-anchor="middle" dominant-baseline="central">Streamlit PWA</text>
  <text class="ts" x="130" y="457" text-anchor="middle" dominant-baseline="central">Works on mobile + Windows</text>
  <text class="ts" x="130" y="472" text-anchor="middle" dominant-baseline="central">Live risk prediction</text>
</g>
<g class="node c-coral" onclick="sendPrompt('What is the emergency alert system?')">
  <rect x="240" y="418" width="180" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="330" y="439" text-anchor="middle" dominant-baseline="central">Emergency alert</text>
  <text class="ts" x="330" y="457" text-anchor="middle" dominant-baseline="central">CHW notification</text>
  <text class="ts" x="330" y="472" text-anchor="middle" dominant-baseline="central">Offline capable</text>
</g>
<g class="node c-coral" onclick="sendPrompt('What does the CHW dashboard look like?')">
  <rect x="440" y="418" width="180" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="530" y="439" text-anchor="middle" dominant-baseline="central">CHW dashboard</text>
  <text class="ts" x="530" y="457" text-anchor="middle" dominant-baseline="central">Patient risk overview</text>
  <text class="ts" x="530" y="472" text-anchor="middle" dominant-baseline="central">ASEAN map view</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="484" x2="340" y2="514" class="arr" marker-end="url(#arrow)"/>

<!-- LAYER 5: Ethics -->
<text class="ts" x="40" y="528" font-size="11" opacity="0.6">PHASE 5 — GOVERNANCE</text>
<g class="node c-gray" onclick="sendPrompt('What does the ethics documentation include?')">
  <rect x="40" y="538" width="170" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="125" y="559" text-anchor="middle" dominant-baseline="central">Ethics docs</text>
  <text class="ts" x="125" y="577" text-anchor="middle" dominant-baseline="central">IRB plan, consent flow</text>
  <text class="ts" x="125" y="592" text-anchor="middle" dominant-baseline="central">Data governance</text>
</g>
<g class="node c-gray" onclick="sendPrompt('How does federated learning protect privacy?')">
  <rect x="230" y="538" width="170" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="315" y="559" text-anchor="middle" dominant-baseline="central">Federated learning</text>
  <text class="ts" x="315" y="577" text-anchor="middle" dominant-baseline="central">Differential privacy</text>
  <text class="ts" x="315" y="592" text-anchor="middle" dominant-baseline="central">No raw data leaves device</text>
</g>
<g class="node c-gray" onclick="sendPrompt('How does image privacy work in MaternaAI?')">
  <rect x="420" y="538" width="170" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="505" y="559" text-anchor="middle" dominant-baseline="central">Image privacy</text>
  <text class="ts" x="505" y="577" text-anchor="middle" dominant-baseline="central">100% on-device CV</text>
  <text class="ts" x="505" y="592" text-anchor="middle" dominant-baseline="central">Zero photos uploaded</text>
</g>

<!-- Score badges -->
<text class="ts" x="40" y="640" opacity="0.5" font-size="11">Score gains from improvements:</text>
<rect x="40"  y="650" width="86" height="24" rx="12" fill="#7F77DD" opacity="0.15"/>
<text class="ts" x="83"  y="666" text-anchor="middle" fill="#534AB7">+10 holdout</text>
<rect x="136" y="650" width="64" height="24" rx="12" fill="#7F77DD" opacity="0.15"/>
<text class="ts" x="168" y="666" text-anchor="middle" fill="#534AB7">+7 demo</text>
<rect x="210" y="650" width="72" height="24" rx="12" fill="#7F77DD" opacity="0.15"/>
<text class="ts" x="246" y="666" text-anchor="middle" fill="#534AB7">+6 SHAP</text>
<rect x="292" y="650" width="80" height="24" rx="12" fill="#7F77DD" opacity="0.15"/>
<text class="ts" x="332" y="666" text-anchor="middle" fill="#534AB7">+6 metrics</text>
<rect x="382" y="650" width="80" height="24" rx="12" fill="#7F77DD" opacity="0.15"/>
<text class="ts" x="422" y="666" text-anchor="middle" fill="#534AB7">+5 fairness</text>
<rect x="472" y="650" width="72" height="24" rx="12" fill="#7F77DD" opacity="0.15"/>
<text class="ts" x="508" y="666" text-anchor="middle" fill="#534AB7">+4 ethics</text>
<rect x="554" y="650" width="86" height="24" rx="12" fill="#1D9E75" opacity="0.2"/>
<text class="ts" x="597" y="666" text-anchor="middle" fill="#0F6E56">= +38 total</text>

<text class="ts" x="340" y="700" text-anchor="middle" opacity="0.4" font-size="11">click any box to explore that component</text>
</svg>
